<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EPS Revision — all 8 lessons</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { display: flex; flex-direction: column; font: 14px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif; background: #0f1729; color: #e7ecf5; }
  header { flex: 0 0 auto; background: #12233f; border-bottom: 2px solid #2b6cb0; box-shadow: 0 2px 10px rgba(0,0,0,.35); }
  .row1 { display: flex; align-items: center; gap: 12px; padding: 8px 14px; }
  .brand { font-weight: 700; font-size: 15px; color: #7fb2f0; white-space: nowrap; }
  .now { font-size: 13px; color: #b9c6dc; }
  .count { margin-left: auto; font-size: 12px; color: #8ea3c2; white-space: nowrap; }
  .nav { display: flex; gap: 6px; }
  .nav button { background: #1c3253; color: #cfe0f7; border: 1px solid #35507c; border-radius: 7px; padding: 5px 11px; font-size: 13px; cursor: pointer; }
  .nav button:hover { background: #244067; }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 14px 9px; }
  .tabs button { background: #182b49; color: #b9c6dc; border: 1px solid #2c466f; border-radius: 999px; padding: 5px 12px; font-size: 12.5px; cursor: pointer; transition: background .12s; }
  .tabs button:hover { background: #21395d; color: #e7ecf5; }
  .tabs button.active { background: #2b6cb0; border-color: #2b6cb0; color: #fff; font-weight: 600; }
  main { flex: 1 1 auto; position: relative; background: #fff; }
  iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #fff; }
  .spin { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#7fb2f0; font-size:13px; background:#0f1729; }
  .hint { padding: 3px 14px 8px; font-size: 11px; color: #6f83a3; }
  .hint a { color: #7fb2f0; text-decoration: none; border-bottom: 1px dotted #4a6488; }
  .hint a:hover { color: #a9cbf3; }
  /* mobile: keep the header short (was eating ~1/3 of the screen) */
  @media (max-width: 640px) {
    .row1 { padding: 5px 10px; gap: 8px; }
    .brand { font-size: 13px; }
    .now { display: none; }
    .count { font-size: 11px; }
    .nav button { padding: 4px 9px; font-size: 12px; }
    .tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 10px 6px; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tabs button { flex: 0 0 auto; }
    .hint { padding: 2px 10px 6px; font-size: 10px; white-space: nowrap; overflow-x: auto; scrollbar-width: none; }
    .hint::-webkit-scrollbar { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="row1">
    <span class="brand">EPS Revision</span>
    <span class="now" id="now"></span>
    <span class="count" id="count"></span>
    <span class="nav">
      <button id="prev" title="Previous (left arrow)">&larr; Prev</button>
      <button id="next" title="Next (right arrow)">Next &rarr;</button>
    </span>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="hint">PDFs (new tab): <a href="EPS-studybook.pdf" target="_blank" rel="noopener">Study Book</a> &middot; <a href="EPS-cheatsheet.pdf" target="_blank" rel="noopener">Cheat Sheet</a> &middot; <a href="eps-mindmap.html" target="_blank" rel="noopener">Mind map</a> &nbsp;|&nbsp; Tabs, Prev / Next, or arrow keys &nbsp;|&nbsp; built by <a href="https://drmohpioneer.github.io/justdrmoh/" target="_blank" rel="noopener" style="color:#7fb2f0;font-weight:600">Dr.&nbsp;Mohamed</a></div>
</header>
<main>
  <iframe id="viewer" title="lesson" loading="lazy"></iframe>
  <div class="spin" id="spin">Loading lesson…</div>
</main>
<script>
// --- open tracker (logs anyone but you to a Google Sheet you own) ---
const TRACKER_URL = "https://script.google.com/macros/s/AKfycbzSLVp9HB5slcSt-E7Ewf2mbe0YrUEoXkUi5KI41CT-Nn-WIHzMbaHU8vDnYla45Cat/exec";
(function track(){
  try {
    const params = new URLSearchParams(location.search);
    if (params.get('me') === '1') localStorage.setItem('rev_owner', '1');  // one-time: mark this device as yours
    if (localStorage.getItem('rev_owner') === '1') return;                 // never log the owner
    if (!/^https?:\/\//.test(TRACKER_URL)) return;                         // dormant until URL is set
    const q = new URLSearchParams({
      page: 'EPS',
      ref: document.referrer || '',
      tz: (Intl.DateTimeFormat().resolvedOptions().timeZone) || '',
      lang: navigator.language || '',
      scr: screen.width + 'x' + screen.height
    });
    new Image().src = TRACKER_URL + '?' + q.toString();
  } catch (e) {}
})();
</script>
<script>
const FILES = ["E1-svt-mechanisms.html", "E2-pathway-localization.html", "E3-pacing.html", "E4-crt.html", "E5-vt-arvc.html", "E6-channelopathies-scd.html", "E7-ecg-rules.html", "E8-af-anticoagulation.html"];
const TABS = ["E1 \u00b7 SVT", "E2 \u00b7 WPW", "E3 \u00b7 Pacing", "E4 \u00b7 CRT", "E5 \u00b7 VT/ARVC", "E6 \u00b7 Channelo.", "E7 \u00b7 ECG rules", "E8 \u00b7 AF/OAC"];
const TITLES = ["E1 \u2014 SVT mechanisms", "E2 \u2014 Pre-excitation & WPW", "E3 \u2014 Pacing", "E4 \u2014 CRT", "E5 \u2014 VT & ARVC", "E6 \u2014 Channelopathies & SCD", "E7 \u2014 ECG rules", "E8 \u2014 AF & anticoagulation"];
const tabsEl = document.getElementById('tabs');
const viewer = document.getElementById('viewer');
const spin = document.getElementById('spin');
const nowEl = document.getElementById('now');
const countEl = document.getElementById('count');
let cur = -1;

TABS.forEach((t, i) => {
  const b = document.createElement('button');
  b.textContent = t;
  b.addEventListener('click', () => show(i));
  tabsEl.appendChild(b);
});
viewer.addEventListener('load', () => { spin.style.display = 'none'; });

function show(i) {
  if (i < 0 || i >= FILES.length || i === cur) return;
  cur = i;
  spin.style.display = 'flex';
  viewer.src = FILES[i];             // fetches only this lesson, browser caches it
  nowEl.textContent = TITLES[i];
  countEl.textContent = (i + 1) + ' / ' + FILES.length;
  [...tabsEl.children].forEach((b, j) => b.classList.toggle('active', j === i));
  document.title = TITLES[i] + ' — EPS Revision';
}

document.getElementById('prev').addEventListener('click', () => show(cur - 1));
document.getElementById('next').addEventListener('click', () => show(cur + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') show(cur - 1);
  else if (e.key === 'ArrowRight') show(cur + 1);
});

show(0);
</script>
</body>
</html>
